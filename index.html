<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Relações Atômicas</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:white;padding:25px;border-radius:15px;box-shadow:0 0 15px rgba(0,0,0,.1)}
header{text-align:center;margin-bottom:25px}
header h1{color:#0d47a1}
.autor{color:#555}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#eef5ff;padding:15px;border-radius:10px}
label{display:block;margin-top:10px;font-weight:bold}
input{width:100%;padding:8px;margin-top:5px;border:1px solid #ccc;border-radius:5px;box-sizing:border-box}
button{margin-top:25px;width:100%;padding:12px;border:none;background:#1565c0;color:white;font-size:16px;border-radius:8px;cursor:pointer}
#resultado{margin-top:20px;padding:15px;background:#f0f8ff;border-radius:10px}
</style>
</head>
<body>
<div class="container">
<header>
<h1>Calculadora de Relações Atômicas</h1>
<p class="autor">Autor: Gabriel Ferreira</p>
</header>

<div class="grid">
<div class="card">
<h2>Átomo A</h2>
<label>Número Atômico (Z)</label>
<input type="number" id="z1">
<label>Número de Massa (A)</label>
<input type="number" id="a1">
<label>Carga Iônica</label>
<input type="number" id="c1" value="0">
</div>

<div class="card">
<h2>Átomo B</h2>
<label>Número Atômico (Z)</label>
<input type="number" id="z2">
<label>Número de Massa (A)</label>
<input type="number" id="a2">
<label>Carga Iônica</label>
<input type="number" id="c2" value="0">
</div>
</div>

<button onclick="calcular()">Verificar Relações</button>
<div id="resultado"></div>
</div>

<script>
function calcular(){
let z1=Number(document.getElementById("z1").value);
let a1=Number(document.getElementById("a1").value);
let c1=Number(document.getElementById("c1").value);
let z2=Number(document.getElementById("z2").value);
let a2=Number(document.getElementById("a2").value);
let c2=Number(document.getElementById("c2").value);

let n1=a1-z1, n2=a2-z2;
let e1=z1-c1, e2=z2-c2;

let r="<h2>Resultado</h2>";
r+=(z1===z2?"✅ São ISÓTOPOS":"❌ Não são Isótopos")+"<br>";
r+=(a1===a2?"✅ São ISÓBAROS":"❌ Não são Isóbaros")+"<br>";
r+=(n1===n2?"✅ São ISÓTONOS":"❌ Não são Isótonos")+"<br>";
r+=(e1===e2?"✅ São ISOELETRÔNICOS":"❌ Não são Isoeletrônicos")+"<br><hr>";
r+="<b>Átomo A</b><br>Neutrons: "+n1+"<br>Elétrons: "+e1+"<br><br>";
r+="<b>Átomo B</b><br>Neutrons: "+n2+"<br>Elétrons: "+e2;
document.getElementById("resultado").innerHTML=r;
}
</script>
</body>
</html>
